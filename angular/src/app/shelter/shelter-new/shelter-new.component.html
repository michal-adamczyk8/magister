<hr>
<div class="row">
    <div class="col-xs-12">
        <button class="btn btn-toolbar" routerLink="/shelters">Cofnij</button>
    </div>
</div>
<div class="row">
    <div class="col-md-8">
        <form #form="ngForm" (ngSubmit)="onSubmit(form)" [formGroup]="shelterForm">
            <div class="row">
                <div class="col-xs-12">
                    <div class="form-group">
                        <label for="name">Nazwa: </label>
                        <input class="form-control" formControlName="name" id="name" placeholder="Nazwa..." type="text">
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-xs-6">
                    <div class="form-group">
                        <label for="phoneNumber">Telefon kontaktowy: </label>
                        <input class="form-control" formControlName="phoneNumber" id="phoneNumber" name="phoneNumber"
                               placeholder="Tel. kontaktowy:..." type="tel">
                    </div>
                </div>
                <div class="col-xs-6">
                    <div class="form-group">
                        <label for="email">Adres email: </label>
                        <input class="form-control" formControlName="email" id="email" name="email" placeholder="Adres email..."
                               type="email">
                    </div>
                </div>
            </div>
            <hr>
            <div class="row">
                <div class="col-xs-6">
                    <div class="form-group">
                        <label for="nip">NIP: </label>
                        <input class="form-control" formControlName="nip" id="nip" name="nip" placeholder="NIP..."
                               type="text">
                    </div>
                </div>
                <div class="col-xs-6">
                    <div class="form-group">
                        <label for="regon">REGON: </label>
                        <input class="form-control" formControlName="regon" id="regon" name="regon" placeholder="REGON..."
                               type="text">
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-xs-6">
                    <div class="form-group">
                        <label for="krs">KRS: </label>
                        <input class="form-control" formControlName="krs" id="krs" name="krs" placeholder="KRS..."
                               type="text">
                    </div>
                </div>
            </div>
            <hr>
            <div class="row">
                <div class="col-xs-6">
                    <div class="form-group">
                        <label for="streetName">Ulica: </label>
                        <input class="form-control" formControlName="streetName" id="streetName" name="streetName"
                               placeholder="Ulica..." type="text">
                    </div>
                </div>
                <div class="col-xs-3">
                    <label for="houseNumber">Numer domu: </label>
                    <input class="form-control" formControlName="houseNumber" id="houseNumber" name="houseNumber"
                           type="text">
                </div>
                <div class="col-xs-3">
                    <label for="flatNumber">Numer mieszkania: </label>
                    <input class="form-control" formControlName="flatNumber" id="flatNumber" name="flatNumber"
                           type="text">
                </div>
            </div>
            <div class="row">
                <div class="col-xs-8">
                    <div class="form-group">
                        <label for="city">Miejscowość: </label>
                        <input class="form-control" formControlName="city" id="city" name="city" placeholder="Miejscowość..."
                               type="text">
                    </div>
                </div>
                <div class="col-xs-4">
                    <div class="form-group">
                        <label for="zipCode">Kod pocztowy: </label>
                        <input class="form-control" formControlName="zipCode" id="zipCode" name="zipCode" placeholder="Kod pocztowy..."
                               type="number">
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-xs-12">
                    <div class="form-group">
                        <label for="description">Opis: </label>
                        <textarea class="form-control" cols="8" formControlName="description" id="description"
                                  name="description"></textarea>
                    </div>
                </div>
            </div>
            <hr>
            <div class="row">
                <div class="col-xs-6">
                    <div class="form-group">
                        <label for="websiteUrl">Link do strony internetowej: </label>
                        <input class="form-control" formControlName="websiteUrl" id="websiteUrl" name="websiteUrl"
                               placeholder="Strona internetowa..." type="text">
                    </div>
                </div>
            </div>
            <hr>
            <div class="row">
                <div class="col-xs-6">
                    <div class="form-group">
                        <label for="facebookUrl">Link do strony Facebook: </label>
                        <input class="form-control" formControlName="facebookUrl" id="facebookUrl" name="facebookUrl"
                               placeholder="Profil Facebook..." type="text">
                    </div>
                </div>
            </div>
            <hr>
            <div class="row">
                <div class="col-xs-6">
                    <div class="form-group">
                        <label for="instagramUrl">Link do strony Instagram: </label>
                        <input class="form-control" formControlName="instagramUrl" id="instagramUrl" name="instagramUrl"
                               placeholder="Profil Instagram..." type="text">
                    </div>
                </div>
            </div>
            <hr>
            <div class="row">
                <div class="col-xs-6">
                    <div class="form-group">
                        <label for="twitterUrl">Link do strony Twitter: </label>
                        <input class="form-control" formControlName="twitterUrl" id="twitterUrl" name="twitterUrl"
                               placeholder="Profil Twitter..." type="text">
                    </div>
                </div>
            </div>
            <hr>
            <div class="row">
                <div class="col-xs-12">
                    <div class="form-group">
                        <label for="logo">Link do logo: </label>
                        <input class="form-control" formControlName="logo" id="logo" name="logo" type="text">
                    </div>
                </div>
            </div>
            <hr>
            <div class="row">
                <div class="col-xs-12">
                    <div class="form-group">
                        <label for="openingTime">Godziny otwarcia: </label>
                        <textarea class="form-control" cols="8" formControlName="openingTime" id="openingTime"
                                  name="openingTime"></textarea>
                    </div>
                </div>
            </div>
            <hr>
            <div class="row">
                <div class="col-xs-10">
                    <div class="form-group">
                        <label for="bankAccount">Numer rachunku bankowego: </label>
                        <input class="form-control" formControlName="bankAccount" id="bankAccount" name="bankAccount"
                               placeholder="Nr rachunku bankowego..." type="text">
                    </div>
                </div>
                <div class="col-xs-10">
                    <div class="form-group">
                        <label for="swiftCode">Kod SWIFT: </label>
                        <input class="form-control" formControlName="swiftCode" id="swiftCode" name="swiftCode"
                               placeholder="Kod SWIFT..." type="text">
                    </div>
                </div>
            </div>
            <hr>
            <div class="row">
                <div class="col-xs-3">
                    <div class="form-group">
                        <button class="btn btn-success" type="submit">Dodaj</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
